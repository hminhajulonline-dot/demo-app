<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Browser Sandbox/iFrame patch:
      // Prevents "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // by defining an interceptor or making window.fetch writable in restricted test beds/sandboxes.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          try {
            var currentFetch = window.fetch;
            Object.defineProperty(Object.getPrototypeOf(window), 'fetch', {
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            try {
              Object.defineProperty(globalThis, 'fetch', {
                value: window.fetch,
                writable: true,
                configurable: true
              });
            } catch (gErr) {
              console.warn("[Vite/Iframe] Could not override fetch property:", gErr);
            }
          }
        }
      })();
    </script>
    <title>CreatorFlow AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
